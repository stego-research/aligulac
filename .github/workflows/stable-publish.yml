name: Build and Publish Stable Docker Image

on:
  push:
    tags:
      - 'stable'
  release:
    types: [released]

permissions:
  contents: read
  packages: write

jobs:
  update-stable-tag:
    if: github.event_name == 'release'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force push stable tag
        run: |
          set -euo pipefail
          tag_name="${{ github.event.release.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f stable "$tag_name"
          git push origin stable --force

  call-reusable-workflow:
    needs: [update-stable-tag]
    if: |
      always() &&
      (github.event_name == 'push' || 
       (github.event_name == 'release' && needs.update-stable-tag.result == 'success'))
    uses: ./.github/workflows/reusable-docker-publish.yml
    with:
      tags: |
        type=raw,value=stable
        type=sha,format=short
    secrets:
      S3_STATIC_ACCESS_KEY: ${{ secrets.S3_STATIC_ACCESS_KEY }}
      S3_STATIC_SECRET_KEY: ${{ secrets.S3_STATIC_SECRET_KEY }}
