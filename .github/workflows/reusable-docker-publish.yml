name: Reusable Build and Publish Docker Image

on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
    secrets:
      S3_STATIC_ACCESS_KEY:
        required: true
      S3_STATIC_SECRET_KEY:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod-builds
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: resources/js-src/package-lock.json

      - name: Install Node.js dependencies
        run: |
          cd resources/js-src
          npm ci

      - name: Build JS from CoffeeScript
        run: |
          cd resources/js-src
          npm run deploy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ inputs.tags }}

      - name: Build Docker image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync static files to S3
        run: |
          # Use the newly built local image to sync files to S3.
          # We pick the first tag to run the container.
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          docker run --rm \
            -e S3_STATIC_BUCKET=${{ vars.S3_STATIC_BUCKET }} \
            -e S3_STATIC_ACCESS_KEY=${{ secrets.S3_STATIC_ACCESS_KEY }} \
            -e S3_STATIC_SECRET_KEY=${{ secrets.S3_STATIC_SECRET_KEY }} \
            -e S3_STATIC_ENDPOINT_URL=${{ vars.S3_STATIC_ENDPOINT_URL }} \
            -e S3_STATIC_REGION=${{ vars.S3_STATIC_REGION }} \
            -e S3_STATIC_CUSTOM_DOMAIN=${{ vars.S3_STATIC_CUSTOM_DOMAIN }} \
            -e SECRET_KEY="build-time-only-key" \
            -e DEBUG="False" \
            $IMAGE_TAG \
            python aligulac/manage.py collectstatic --noinput

      - name: Push Docker image
        run: |
          # Push all tags generated for this image
          echo "${{ steps.meta.outputs.tags }}" | xargs -I {} docker push {}
